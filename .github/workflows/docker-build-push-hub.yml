name: docker-build-push-hub

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-scan-push:
    name: Build, scan, push ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            dockerfile: deployment/phase-7-cicd/Dockerfile.backend
            repo_suffix: launchboard-backend-k8s-cicd
          - component: frontend
            dockerfile: deployment/phase-7-cicd/Dockerfile.frontend
            repo_suffix: launchboard-frontend-k8s-cicd
    steps:
      - uses: actions/checkout@v4

      - name: Set image variables
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.repo_suffix }}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: |
            ${{ env.FULL_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FULL_IMAGE }}:latest

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FULL_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.FULL_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.FULL_IMAGE }}:latest
