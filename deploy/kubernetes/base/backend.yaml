apiVersion: apps/v1
kind: Deployment
metadata:
  name: launchboard-api
  namespace: launchboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: launchboard-api
  template:
    metadata:
      labels:
        app: launchboard-api
    spec:
      containers:
        - name: api
          image: launchboard-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: launchboard-config
            - secretRef:
                name: launchboard-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: launchboard-api
  namespace: launchboard
spec:
  selector:
    app: launchboard-api
  ports:
    - port: 8000
      targetPort: 8000

