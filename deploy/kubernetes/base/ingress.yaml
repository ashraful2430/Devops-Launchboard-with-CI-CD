apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: launchboard
  namespace: launchboard
spec:
  rules:
    - host: launchboard.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: launchboard-api
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: launchboard-api
                port:
                  number: 8000
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: launchboard-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: launchboard-web
                port:
                  number: 80

