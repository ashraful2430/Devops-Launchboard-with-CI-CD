apiVersion: apps/v1
kind: Deployment
metadata:
  name: launchboard-web
  namespace: launchboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: launchboard-web
  template:
    metadata:
      labels:
        app: launchboard-web
    spec:
      containers:
        - name: web
          image: launchboard-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: launchboard-web
  namespace: launchboard
spec:
  selector:
    app: launchboard-web
  ports:
    - port: 80
      targetPort: 80

